<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TabulaKit</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css">
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script>mermaid.initialize({ startOnLoad: false, securityLevel: 'loose', theme: 'dark', themeVariables: { primaryColor: '#2E4057', primaryTextColor: '#ddd', primaryBorderColor: '#3bc0cb', lineColor: '#3bc0cb', secondaryColor: '#333', tertiaryColor: '#222' } });</script>
  <script src="config.js"></script>
  <script src="auth-config.js"></script>
  <style>
    :root {
      --theme-color: #e84118;
      --theme-color-teal: #3bc0cb;
      --sidebar-width: 280px;
      --base-font-size: 16px;
      --base-background-color: #222222;
      --base-color: #dddddd;
      --sidebar-background: #2a2a2a;
      --sidebar-nav-link-color--active: var(--theme-color-teal);
      --sidebar-name-color: var(--theme-color-teal);
      --sidebar-nav-link-border-color--active: var(--theme-color-teal);
      --heading-color: var(--theme-color);
      --heading-h2-color: var(--theme-color);
      --blockquote-border-color: var(--theme-color);
      --table-head-background: #2E4057;
      --code-inline-background: #1e293b;
      --code-inline-color: var(--theme-color-teal);
      --sidebar-nav-link-padding: 0.3em 0;
      --sidebar-nav-strong-margin: 1.2em -25px 0.4em 0;
      --sidebar-nav-strong-padding: 0.15em 0 0.4em 0;
      --sidebar-nav-strong-color: var(--theme-color-teal);
      --sidebar-nav-strong-font-size: 0.75em;
      --sidebar-nav-strong-text-transform: uppercase;
      --sidebar-nav-strong-border-color: transparent;
      --sidebar-nav-strong-border-width: 0;
      --sidebar-nav-pagelink-background: none;
      --sidebar-nav-pagelink-background--active: none;
      --sidebar-nav-pagelink-background--collapse: none;
      --sidebar-nav-pagelink-background--loaded: none;
      --sidebar-nav-pagelink-padding: 0.25em 0;
      --link-color: var(--theme-color-teal);
      --link-color--hover: #5eead4;
      --sidebar-border-color: #3a3a3a;
      --sidebar-border-width: 0;
      --notice-tip-border-color: var(--theme-color-teal);
    }
    body { background: #222222; font-size: 16px; }
    .markdown-section { font-size: 16px; line-height: 1.7; }
    .sidebar-nav { padding-bottom: 8rem !important; }
    .sidebar > h1, .sidebar > h1 > a { text-align: left !important; }
    .sidebar > h1 { padding-left: 0; margin-left: 0; }
    .sidebar > h1 > a { padding: 0 !important; margin: 0 !important; color: var(--theme-color-teal) !important; font-weight: 700 !important; }
    .sidebar-nav > ul > li > p { margin: 0 !important; }

    /* Section headings: non-clickable, uppercase, muted, with spacing */
    .sidebar-nav > ul > li:has(> p > strong) { margin-top: 1.2em !important; }
    .sidebar-nav > ul > li:has(> p > strong):first-child { margin-top: 0 !important; }
    .sidebar-nav > ul > li > p > strong {
      color: var(--theme-color-teal);
      font-size: 0.7em;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 600;
    }

    /* Collapsible sections: items below a section heading */
    .sidebar-nav > ul > li:has(> p > strong) ~ li > a,
    .sidebar-nav > ul > li > a {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* Active nav item styling */
    .sidebar-nav li.active > a {
      color: var(--theme-color-teal) !important;
      font-weight: 500;
    }

    /* Tables */
    table { width: 100%; }
    td, th { vertical-align: top; }
    th { background: #2E4057 !important; color: white !important; }
    .markdown-section table td:first-child,
    .markdown-section table th:first-child { white-space: nowrap; }

    /* Mobile stacked card tables */
    @media screen and (max-width: 768px) {
      .markdown-section table,
      .markdown-section thead,
      .markdown-section tbody,
      .markdown-section th,
      .markdown-section td,
      .markdown-section tr { display: block; }

      .markdown-section thead tr {
        position: absolute;
        top: -9999px;
        left: -9999px;
      }

      .markdown-section tr {
        border: 1px solid #3a3a3a;
        border-radius: 6px;
        margin-bottom: 0.75em;
        padding: 0.5em;
        background: #2a2a2a;
      }

      .markdown-section td {
        border: none !important;
        position: relative;
        padding: 0.35em 0.5em 0.35em 40%;
        text-align: left;
        white-space: normal !important;
        word-wrap: break-word;
        min-height: 1.4em;
      }

      .markdown-section td:before {
        content: attr(data-label);
        position: absolute;
        left: 0.5em;
        width: 35%;
        padding-right: 0.5em;
        font-weight: 700;
        color: var(--theme-color-teal);
        font-size: 0.85em;
        white-space: normal;
        word-wrap: break-word;
      }

      .markdown-section td:first-child {
        white-space: normal !important;
        font-weight: 600;
        color: var(--theme-color);
      }
    }

    /* Headings */
    .markdown-section h1,
    .markdown-section h2,
    .markdown-section h3 { border-bottom: none !important; padding-bottom: 0; }
    .markdown-section h1 { color: var(--theme-color); }
    .markdown-section h2 { color: var(--theme-color); }
    .markdown-section h3 { color: #dddddd; }

    /* Scrollbar */
    .sidebar::-webkit-scrollbar { width: 6px; }
    .sidebar::-webkit-scrollbar-track { background: transparent; }
    .sidebar::-webkit-scrollbar-thumb { background: rgba(156, 163, 175, 0.5); border-radius: 3px; }
    .sidebar::-webkit-scrollbar-thumb:hover { background: rgba(156, 163, 175, 0.7); }

    /* Auth gate styles */
    #auth-gate {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: #1a1a2e;
      color: #ccc;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      text-align: center;
      padding: 1em;
      box-sizing: border-box;
      z-index: 9999;
    }
    #auth-gate h1 { color: var(--theme-color); margin-bottom: 0.5em; }
    #auth-gate p { margin: 0.3em 0; max-width: 90vw; }
    #auth-gate .subtitle { color: #888; font-size: 0.9em; }
    #auth-gate .error { color: #cc0000; margin-top: 1em; }
    #sign-in-btn {
      margin-top: 2em;
      padding: 12px 32px;
      font-size: 1em;
      background: var(--theme-color);
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    #sign-in-btn:hover { opacity: 0.85; }
    #sign-in-btn:disabled { background: #666; cursor: wait; }

    /* Mermaid diagram styles */
    .mermaid-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: rgba(0,0,0,0.85);
      z-index: 9998;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
      padding: 1em;
      box-sizing: border-box;
    }
    .mermaid-overlay svg {
      max-width: 95vw;
      max-height: 95vh;
    }
    .mermaid { cursor: zoom-in; }
  </style>
</head>
<body>
  <div id="auth-gate" style="display:none">
    <h1 id="auth-site-name"></h1>
    <p id="auth-site-desc"></p>
    <p class="subtitle" id="auth-hint"></p>
    <button id="sign-in-btn" onclick="signIn()">Sign in with Google</button>
    <p id="auth-error" class="error" style="display:none"></p>
  </div>
  <div id="app"></div>

  <script>
    (function() {
      var config = window.TABULAKIT_CONFIG || {};
      var auth = window.TABULAKIT_AUTH || { mode: "public" };
      var theme = config.theme || {};

      // Apply site title
      document.title = config.name || "Documentation";

      // Apply theme colors from config
      var root = document.documentElement.style;
      if (theme.color) {
        root.setProperty('--theme-color', theme.color);
        root.setProperty('--heading-color', theme.color);
        root.setProperty('--heading-h2-color', theme.color);
      }
      if (theme.tealColor) {
        root.setProperty('--theme-color-teal', theme.tealColor);
        root.setProperty('--sidebar-nav-link-color--active', theme.tealColor);
        root.setProperty('--sidebar-name-color', theme.tealColor);
        root.setProperty('--link-color', theme.tealColor);
      }
      if (theme.sidebarWidth) {
        root.setProperty('--sidebar-width', theme.sidebarWidth);
      }
      if (theme.baseFontSize) {
        root.setProperty('--base-font-size', theme.baseFontSize);
      }

      // Build sidebar name (with optional logo)
      var sidebarName = config.name || "Documentation";
      if (config.logo) {
        sidebarName = '<img src="' + config.logo + '" alt="" style="width:36px;vertical-align:middle;margin-right:10px">' + sidebarName;
      }

      function loadDocsify() {
        // Hide auth gate, show app
        var gate = document.getElementById('auth-gate');
        if (gate) gate.style.display = 'none';
        document.getElementById('app').style.display = '';

        var docsifyOpts = config.docsify || {};

        window.$docsify = {
          name: sidebarName,
          repo: false,
          loadSidebar: true,
          subMaxLevel: docsifyOpts.subMaxLevel || 3,
          auto2top: true,
          search: docsifyOpts.search ? {
            placeholder: 'Search...',
            noData: 'No results',
            depth: 3
          } : false,
          plugins: [
            function(hook) {
              // Transform mermaid code blocks into mermaid divs
              hook.afterEach(function(html) {
                return html.replace(/<pre[^>]*><code[^>]*class="lang-mermaid"[^>]*>([\s\S]*?)<\/code><\/pre>/gi, function(m, code) {
                  return '<div class="mermaid">' + code.replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&quot;/g, '"') + '</div>';
                });
              });

              hook.doneEach(function() {
                // Render mermaid diagrams
                if (window.mermaid) {
                  try { mermaid.run(); } catch(e) {}
                }

                // Mermaid click-to-zoom
                document.querySelectorAll('.mermaid').forEach(function(el) {
                  if (el.dataset.zoomBound) return;
                  el.dataset.zoomBound = '1';
                  el.addEventListener('click', function() {
                    var svg = el.querySelector('svg');
                    if (!svg) return;
                    var overlay = document.createElement('div');
                    overlay.className = 'mermaid-overlay';
                    overlay.appendChild(svg.cloneNode(true));
                    overlay.addEventListener('click', function() { overlay.remove(); });
                    document.body.appendChild(overlay);
                  });
                });

                // Inject data-label attributes for mobile stacked tables
                var tables = document.querySelectorAll('.markdown-section table');
                tables.forEach(function(table) {
                  var headers = [];
                  table.querySelectorAll('thead th').forEach(function(th) {
                    headers.push(th.textContent.trim());
                  });
                  if (headers.length) {
                    table.querySelectorAll('tbody tr').forEach(function(tr) {
                      tr.querySelectorAll('td').forEach(function(td, i) {
                        if (headers[i]) td.setAttribute('data-label', headers[i]);
                      });
                    });
                  }
                });
              });
            }
          ]
        };

        var docsifyScript = document.createElement('script');
        docsifyScript.src = 'https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js';
        docsifyScript.onload = function() {
          if (docsifyOpts.search) {
            var searchScript = document.createElement('script');
            searchScript.src = 'https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js';
            document.body.appendChild(searchScript);
          }
        };
        document.body.appendChild(docsifyScript);
      }

      // --- Public mode: skip auth entirely ---
      if (auth.mode === "public") {
        loadDocsify();
        return;
      }

      // --- Authenticated modes: show gate ---
      var gate = document.getElementById('auth-gate');
      gate.style.display = 'flex';
      document.getElementById('auth-site-name').textContent = config.name || "Documentation";
      document.getElementById('auth-site-desc').textContent = config.description || "";

      if (auth.mode === "domain") {
        document.getElementById('auth-hint').textContent = "Sign in with your " + auth.allowedDomain + " account";
      } else {
        document.getElementById('auth-hint').textContent = "Sign in with an authorized Google account";
      }

      // Load Firebase and set up auth
      function loadScript(src) {
        return new Promise(function(resolve, reject) {
          var s = document.createElement('script');
          s.type = 'module';
          s.textContent = 'import * as m from "' + src + '"; window.__fb_mod = window.__fb_mod || {}; window.__fb_mod["' + src + '"] = m; document.dispatchEvent(new Event("fb_loaded"));';
          document.head.appendChild(s);
        });
      }

      // Use ES module imports for Firebase
      var initScript = document.createElement('script');
      initScript.type = 'module';
      initScript.textContent = [
        'import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";',
        'import { getAuth, signInWithPopup, onAuthStateChanged, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";',
        '',
        'var auth = window.TABULAKIT_AUTH;',
        'var app = initializeApp(auth.firebase);',
        'var fbAuth = getAuth(app);',
        'var provider = new GoogleAuthProvider();',
        '',
        'if (auth.mode === "domain" && auth.allowedDomain) {',
        '  provider.setCustomParameters({ hd: auth.allowedDomain });',
        '}',
        '',
        'function checkEmail(email) {',
        '  if (auth.mode === "domain") {',
        '    return email.endsWith("@" + auth.allowedDomain);',
        '  }',
        '  if (auth.mode === "allowlist") {',
        '    return (auth.allowedEmails || []).indexOf(email) !== -1;',
        '  }',
        '  return false;',
        '}',
        '',
        'function showError(msg) {',
        '  var el = document.getElementById("auth-error");',
        '  el.textContent = msg;',
        '  el.style.display = "";',
        '  document.getElementById("sign-in-btn").disabled = false;',
        '}',
        '',
        'window.signIn = async function() {',
        '  document.getElementById("sign-in-btn").disabled = true;',
        '  document.getElementById("auth-error").style.display = "none";',
        '  try {',
        '    var result = await signInWithPopup(fbAuth, provider);',
        '    if (!checkEmail(result.user.email)) {',
        '      await fbAuth.signOut();',
        '      showError("Access denied. Your account is not authorized.");',
        '      return;',
        '    }',
        '    window.__tabulakit_loadDocsify();',
        '  } catch (e) {',
        '    showError("Sign-in failed. Please try again.");',
        '  }',
        '};',
        '',
        '// Auto-login for returning users',
        'if (location.hostname === "localhost" || location.hostname === "127.0.0.1") {',
        '  window.__tabulakit_loadDocsify();',
        '} else {',
        '  onAuthStateChanged(fbAuth, function(user) {',
        '    if (user && checkEmail(user.email)) {',
        '      window.__tabulakit_loadDocsify();',
        '    }',
        '  });',
        '}'
      ].join('\n');

      window.__tabulakit_loadDocsify = loadDocsify;
      document.head.appendChild(initScript);
    })();
  </script>
</body>
</html>
